name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Coding standard, static analysis & tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, mbstring, pdo_mysql, dom
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Coding standard (php-cs-fixer)
        run: composer cs

      - name: Static analysis (PHPStan)
        run: composer stan

      - name: Tests (PHPUnit)
        run: composer test
